name: Refresh And Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Refresh live data
        if: ${{ secrets.MCD_API_KEY != '' }}
        env:
          MCD_API_KEY: ${{ secrets.MCD_API_KEY }}
          MCD_MARKET_ID: ${{ vars.MCD_MARKET_ID || 'US' }}
          MCD_LANGUAGE_NAME: ${{ vars.MCD_LANGUAGE_NAME || 'en-US' }}
          MCD_PLATFORM: ${{ vars.MCD_PLATFORM || 'iphone' }}
          MCD_APPLICATION: ${{ vars.MCD_APPLICATION || 'MOT' }}
        run: npm run refresh-data

      - name: Use committed sample data
        if: ${{ secrets.MCD_API_KEY == '' }}
        run: echo "MCD_API_KEY is not set; building with committed sample datasets."

      - name: Run tests
        run: |
          npm run test
          npm run test:crawler

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
