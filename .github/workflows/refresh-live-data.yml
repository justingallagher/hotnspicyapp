name: Refresh Live Data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: write

concurrency:
  group: refresh-live-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      BASIC_TOKEN_US: ${{ secrets.BASIC_TOKEN_US }}
      HOT_SPICY_PRODUCT_CODES: ${{ vars.HOT_SPICY_PRODUCT_CODES || vars.MCD_TARGET_PRODUCT_CODES || '12345' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Skip when basic token is missing
        if: ${{ env.BASIC_TOKEN_US == '' }}
        run: echo "BASIC_TOKEN_US is not set; skipping live data refresh."

      - name: Refresh live data
        if: ${{ env.BASIC_TOKEN_US != '' }}
        run: npm run refresh-data

      - name: Check crawler tests
        if: ${{ env.BASIC_TOKEN_US != '' }}
        run: npm run test:crawler

      - name: Commit refreshed cache
        if: ${{ env.BASIC_TOKEN_US != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/hot-n-spicy-mcchicken.v1.json public/data/us-search-index.v1.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh live McDonald's cache"
          git push
